<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成与解码工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>二维码生成与解码工具</h1>
        <div class="tabs">
            <button class="tab-button active" data-tab="generate">生成二维码</button>
            <button class="tab-button" data-tab="decode">解码二维码</button>
        </div>
        <div id="generate" class="tab-content active">
            <form id="generate-form">
                <label>选择类型:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="type" value="text" checked> 文本
                    </label>
                    <label>
                        <input type="radio" name="type" value="url"> 网址
                    </label>
                    <label>
                        <input type="radio" name="type" value="email"> 邮件
                    </label>
                    <label>
                        <input type="radio" name="type" value="wifi"> WiFi
                    </label>
                </div>
                <div id="input-fields">
                    <div class="input-group">
                        <label for="text">文本:</label>
                        <input type="text" id="text" name="text" placeholder="输入文本">
                    </div>
                </div>
                <button type="submit">生成二维码</button>
            </form>
            <div id="qrcode-output"></div>
        </div>
        <div id="decode" class="tab-content">
            <form id="decode-form">
                <label for="file">上传二维码图片:</label>
                <input type="file" id="file" name="file" accept="image/*">
                <button type="submit">解码二维码</button>
            </form>
            <div id="decode-output"></div>
            <div id="decode-hint">
                <p>或者：</p>
                <p>1. 拖动图片到此处</p>
                <p>2. 从剪切板粘贴图片</p>
            </div>
        </div>
    </div>
    <script src="qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
