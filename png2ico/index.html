<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG to ICO Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PNG to ICO Converter</h1>
        <div class="upload-section">
            <label for="file-upload" class="upload-label">Choose PNG File</label>
            <input type="file" id="file-upload" accept="image/png">
        </div>
        <div class="preview-section">
            <img id="preview" src="#" alt="Preview">
        </div>
        <div class="size-selection">
            <label>Select ICO Size:</label>
            <select id="size-select">
                <option value="16">16x16</option>
                <option value="32">32x32</option>
                <option value="64">64x64</option>
                <option value="128">128x128</option>
            </select>
        </div>
        <button id="convert-btn">Convert to ICO</button>
        <a id="download-link" style="display:none;">Download ICO</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
