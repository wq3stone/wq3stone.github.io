<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>图片压缩工具</h1>
        <div class="upload-section">
            <label for="fileInput" class="upload-label">选择图片</label>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        <div class="quality-control">
            <label for="quality">压缩质量 (0.1-1):</label>
            <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">
            <span id="qualityValue">0.8</span>
        </div>
        <div class="button-group">
            <button id="compressBtn" class="btn-primary">压缩图片</button>
            <button id="downloadBtn" class="btn-secondary" disabled>批量下载</button>
        </div>
        <div id="preview" class="preview-section"></div>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="modal">
        <span class="close">&times;</span>
        <div class="modal-controls">
            <button id="zoomInBtn" class="modal-btn">+</button>
            <button id="zoomOutBtn" class="modal-btn">-</button>
        </div>
        <img id="modalImage" class="modal-content">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
